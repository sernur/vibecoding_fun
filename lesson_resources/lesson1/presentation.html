document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"20c9e9c7-d689-4986-b4f1-6326faa665ca\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --bg: #F5F1EB;\n  --bg-alt: #EDE7DD;\n  --ink: #1A1714;\n  --ink-soft: #2B241E;\n  --muted: #8B7F73;\n  --line: #D9D0C2;\n  --accent: #C2410C;\n  --accent-soft: #E8DFD3;\n\n  --serif: 'Instrument Serif', 'Times New Roman', serif;\n  --sans: 'Geist', 'Helvetica Neue', system-ui, sans-serif;\n  --mono: 'Geist Mono', ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: #0a0a0a;\n  font-family: var(--sans);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\ndeck-stage section {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  overflow: hidden;\n  position: relative;\n}\n\n/* ====== INVERTED (dark) section variant ====== */\nsection.inverted {\n  background: var(--ink) !important;\n  color: var(--bg) !important;\n}\nsection.inverted .muted { color: #B8AC9E !important; }\nsection.inverted .rule { background: #3A332C !important; }\nsection.inverted .accent { color: #F97316 !important; }\n\n/* ====== Common slide chrome ====== */\n.slide {\n  width: 100%;\n  height: 100%;\n  padding: 100px;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n}\n\n.slide-header {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.08em;\n  color: var(--muted);\n  text-transform: uppercase;\n  margin-bottom: 28px;\n}\n\n.slide-header .left { display: flex; gap: 32px; align-items: baseline; }\n.slide-header .accent-tag { color: var(--accent); }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 20px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 32px;\n}\n\n.title {\n  font-family: var(--serif);\n  font-weight: 400;\n  font-size: 116px;\n  line-height: 0.98;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0;\n}\n\n.title .it { font-style: italic; }\n\n.subtitle {\n  font-family: var(--sans);\n  font-size: 34px;\n  font-weight: 400;\n  line-height: 1.4;\n  color: var(--ink-soft);\n  margin: 0;\n  max-width: 1400px;\n}\n\n.body {\n  font-family: var(--sans);\n  font-size: 32px;\n  line-height: 1.5;\n  font-weight: 400;\n  color: var(--ink-soft);\n}\n\n.small {\n  font-size: 24px;\n  font-family: var(--mono);\n  color: var(--muted);\n  letter-spacing: 0.04em;\n}\n\n.muted { color: var(--muted); }\n.accent { color: var(--accent); }\n\n.rule {\n  height: 1px;\n  background: var(--line);\n  width: 100%;\n}\n\n.tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  padding: 8px 14px;\n  border: 1px solid var(--line);\n  color: var(--muted);\n  border-radius: 2px;\n}\n\n/* Number / huge figure */\n.huge-num {\n  font-family: var(--serif);\n  font-size: 380px;\n  line-height: 0.85;\n  letter-spacing: -0.04em;\n  color: var(--ink);\n}\n\n/* Section header (parallel layout) */\n.section-header {\n  width: 100%;\n  height: 100%;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  padding: 100px;\n  align-items: end;\n  gap: 80px;\n}\n.section-header .num {\n  font-family: var(--serif);\n  font-size: 320px;\n  line-height: 0.9;\n  font-style: italic;\n  color: var(--accent);\n}\n.section-header .label {\n  font-family: var(--mono);\n  font-size: 22px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 24px;\n}\n.section-header .heading {\n  font-family: var(--serif);\n  font-size: 96px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 36px 0;\n}\n.section-header .desc {\n  font-family: var(--sans);\n  font-size: 28px;\n  line-height: 1.5;\n  color: var(--ink-soft);\n  max-width: 640px;\n}\n\n/* Quote slide */\n.quote-block {\n  font-family: var(--serif);\n  font-size: 78px;\n  line-height: 1.08;\n  letter-spacing: -0.015em;\n  font-weight: 400;\n  color: var(--ink);\n  max-width: 1500px;\n}\n.quote-block .open {\n  font-size: 1.2em;\n  color: var(--accent);\n  line-height: 0;\n  vertical-align: -0.15em;\n  margin-right: 8px;\n}\n.quote-attrib {\n  font-family: var(--mono);\n  font-size: 22px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* footer corner */\n.corner-tag {\n  position: absolute;\n  bottom: 60px;\n  left: 100px;\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n.corner-tag-right {\n  position: absolute;\n  bottom: 60px;\n  right: 100px;\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* List */\n.list {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n.list li {\n  display: grid;\n  grid-template-columns: 80px 1fr;\n  gap: 24px;\n  font-size: 32px;\n  line-height: 1.4;\n  align-items: baseline;\n}\n.list li .idx {\n  font-family: var(--mono);\n  font-size: 20px;\n  color: var(--accent);\n  letter-spacing: 0.08em;\n}\n\n/* Card grid */\n.cards {\n  display: grid;\n  gap: 28px;\n}\n.card {\n  border: 1px solid var(--line);\n  background: var(--bg);\n  padding: 36px 40px;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.card .label {\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--accent);\n}\n.card .h {\n  font-family: var(--serif);\n  font-size: 48px;\n  line-height: 1.05;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.card .p {\n  font-size: 26px;\n  line-height: 1.45;\n  color: var(--ink-soft);\n  margin: 0;\n}\n\n/* Table */\n.tbl {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 26px;\n}\n.tbl th, .tbl td {\n  text-align: left;\n  padding: 22px 24px;\n  border-bottom: 1px solid var(--line);\n  vertical-align: top;\n}\n.tbl th {\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n  font-weight: 500;\n  border-bottom: 1px solid var(--ink);\n}\n.tbl td:first-child {\n  font-family: var(--serif);\n  font-size: 32px;\n  font-style: italic;\n  color: var(--accent);\n  width: 26%;\n}\n\n/* Decorative diagonal stripes for placeholder imagery */\n.placeholder-img {\n  background:\n    repeating-linear-gradient(\n      135deg,\n      var(--accent-soft) 0 18px,\n      transparent 18px 36px\n    ),\n    var(--bg-alt);\n  border: 1px solid var(--line);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--mono);\n  font-size: 16px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* Wave / dalga visual */\n.wave-row {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 32px;\n  width: 100%;\n}\n.wave {\n  border-top: 1px solid var(--line);\n  padding-top: 28px;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.wave .num {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 96px;\n  line-height: 1;\n  color: var(--accent);\n}\n.wave .yr {\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.08em;\n  color: var(--muted);\n  text-transform: uppercase;\n}\n.wave .h {\n  font-family: var(--serif);\n  font-size: 44px;\n  line-height: 1.05;\n  margin: 0;\n}\n.wave .p {\n  font-size: 24px;\n  line-height: 1.45;\n  color: var(--ink-soft);\n  margin: 0;\n}\n<\u002Fstyle>\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n\"Hoş geldiniz. VIBE CODING'in ilk dersine başlıyoruz. Önümüzdeki beş hafta boyunca AI ile yazılım geliştirmeyi sıfırdan ele alacağız. Bugün bu yolculuğun en önemli parçasını konuşacağız: tam olarak ne değişti, neden değişti, biz neredeyiz. Bu ders kod yazma dersi değil, perspektif dersi.\",\n\n\"Kısaca kendimden bahsedeyim. Ben Oğuzhan Çetinkaya. Şu anda San Francisco Bay Area'da Automation Anywhere'de Machine Learning Architect olarak çalışıyorum. Yıllardır yazılım ve AI kesişiminde, hem kod yazıyorum hem de kod yazan sistemler tasarlıyorum. Bir not: geçen Salı-Çarşamba DeepLearning.AI'ın AI Dev Days 2026'sındaydım, San Francisco'da. Çok taze bilgilerle döndüm — birazdan o rakamları da paylaşacağım. LinkedIn'den ulaşabilirsiniz.\",\n\n\"İki saatlik yolculuğumuz şöyle: önce büyük resim ve paradigma kayması. Sonra tarih — bu film daha önce defalarca oynadı. Sonra fırsatlar ve dürüst sorunlar. Ardından üç yıl önce yazılımın hali, üç dalga, üç kavram. Son olarak ödev. Hazırsanız başlayalım.\",\n\n\"Önce bir cümle: yaşadığımız şey bir araç güncellemesi değil. Yeni bir IDE öğrenmiyoruz, yeni bir framework değiştirmiyoruz. Yazılımı üretme şeklimizin kendisi değişiyor. Kim yazıyor, nasıl yazıyor, değer nereye akıyor — hepsi yeniden yazılıyor.\",\n\n\"Şunu da hemen ekleyeyim: insanlık tarihinin en büyük teknolojik kırılmalarından birinin tam başındayız. PC devrimi yaşadık, internet devrimi yaşadık, akıllı telefon devrimi yaşadık — her biri bireysel yaşamı, sosyal yapıyı ve kurumsal dünyayı değiştirdi. Ama AI'ın bir farkı var. Önceki kırılımlar bize yeni araçlar verdi — biz o araçlarla daha çok iş yaptık. AI doğrudan insanın yaptığı işin yerine geçecek şekilde tasarlanıyor. Yazılımcılar başta olmak üzere her meslek grubunu farklı bir biçimde tehdit ediyor. Bu yüzden bu kırılımı diğerleriyle aynı kefeye koymak yanıltıcı olur.\",\n\n\"Şimdi tahminlere bakalım. İlk söz Anthropic CEO'su Dario Amodei'den. Önümüzdeki bir ila beş yıl içinde teknoloji, hukuk, danışmanlık ve finansta giriş seviyesi rollerin yarısının yok olabileceğini söylüyor. Sert bir uyarı. Önemli olan şu: kaybolan iş değil, kaybolan basamak. Çünkü senior olmanın yolu junior olmaktan geçiyordu. O basamağı dışarı çıkarırsak, yarının senior'ları nereden gelecek?\",\n\n\"Amodei tek değil. Karpathy 'doğal dil yeni programlama dili' diyor. Sam Altman tek kişilik milyar dolarlık şirketten bahsediyor. Jensen Huang 'çocuklarınıza kod öğretmeyin' diyor. Satya Nadella Microsoft'ta kodun yüzde otuzunun AI tarafından yazıldığını paylaştı. Burada önemli olan kehanetlerin ortaklığı — sektörün zirvesindeki insanlar aynı yere işaret ediyor.\",\n\n\"Şimdi taze rakamlar — geçen hafta DeepLearning.AI AI Dev Days'den. Cursor: Aralık 2025 itibariyle agent request'leri tab accept oranlarını geçti. Enterprise commit'lerin yüzde altmışı, PR'ların yüzde yirmisi agent'lar tarafından yapılıyor. Google: kodun yüzde yetmiş beşi agent'lar tarafından yazılıyor. Karpathy'nin tweet'i: 'The hottest programming language is English.' Bunlar tahmin değil, şu anki gerçeklik. Sadece üç yılda buraya geldik.\",\n\n\"Şimdi nefes alalım. Bu film daha önce oynadı. Defalarca. Tarih bize benzer dönüşümleri çok kez gösterdi ve hepsinde aynı desen var. Üç örneğe hızlıca bakacağız. Amaç nostalji değil — desen.\",\n\n\"Birinci örnek: matbaa. On beşinci yüzyılda kitaplar elle kopyalanıyordu. Bir İncil bir katibin bir yılını alıyordu. Matbaa geldi, aynı kitap günlerle ölçüldü. Katiplik mesleği yok oldu. Ama yerine matbaacılar, dizgiciler, yayıncılar, editörler, gazeteciler, kitapçılar geldi. Kaybolan iş değildi, eski beceriydi. Yeni rolleri ilk öğrenenler kazandı.\",\n\n\"İkinci örnek: at arabasından otomobile. Nalbantlar, ahırlar, araba üreticileri yok oldu. Yerine fabrikalar, benzin istasyonları, sigortacılar, lojistik geldi. Sadece araç değişmedi — şehirlerin yapısı, mesafe algısı, hayatın kendisi değişti. Bugün de aynı: sadece kod değil, takım yapısı, kariyer yolu, eğitim değişiyor.\",\n\n\"Üçüncü örnek belki size en yakın olanı: tarımdaki büyük makineleşme. Yüz yıl öncesine kadar tarım büyük ölçüde insan emeğine ve hayvan gücüne dayanıyordu. Bir köyde herkes — kadın, erkek, çocuk — tarlaya iniyordu. Sonra traktör geldi, biçerdöver geldi, sulama sistemleri, gübreleme makineleri, modern ekipman geldi. Sonuç: daha az insanla çok daha fazla üretim. Tarım işçiliği eridi, köyden şehre büyük göç başladı. Ama yerine ne geldi? Makine üretimi, bakım servisleri, yakıt sektörü, tarım mühendisliği, lojistik, gıda zinciri. Bu mekanik saat veya fotoğraf gibi yerel bir yenilik değildi — toplum yapısının kendisini değiştiren bir dönüşümdü. Bugün yazılımda yaşanan da tam olarak bu ölçekte. Sadece kod değil, ekiplerin yapısı, kariyer yolları, eğitim, hatta şehirlerin işgücü dağılımı yeniden şekilleniyor.\",\n\n\"Üç örnekte de aynı desen var. El emeği makineye, mekanik sistem dijitale, fiziksel ürün dijital servise, sahiplik aboneliğe, uzman zanaat kitlesel kullanıma, yerel pazar küresel platforma. Hepsinde aynı temel: değer üreten beceri değişti. Eski beceri değersizleşmedi tam olarak, ama yeni beceri çok daha değerli hale geldi. Bugün yazılım için biz bu satırın neresindeyiz? El emeğinden makineye, bireysel yazımdan ajansal sisteme. Tam o noktadayız.\",\n\n\"Şimdi en önemli noktaya geliyoruz. Yıkım korkutucu görünebilir, evet. Ama her paradigma değişikliği aynı şeyi yapar — eski beceriler değersizleşir, yeni beceriler altın değerinde olur. Burada size şunu söylemek istiyorum: yeni düzene ayak uydurursanız, yetenek setinizi güncellerseniz, yeni sistemde ihtiyaç duyulan rollere bürünürseniz, işten atılma ya da iş bulamama korkusu yerine çok avantajlı şartlarda çok aranan kişiler olabilirsiniz. Hatta bir adım öteye gidip yeni düzenin ihtiyaç duyduğu araçları, şirketleri, hizmetleri siz üretebilirsiniz. Soru artık 'ayakta kalır mıyım' değil — 'bu dalgayı nasıl bineceğim' sorusu. Krizi fırsata çevirme zamanı tam olarak şimdi. Bu kursun tüm yapısı bunun üzerine kurulu.\",\n\n\"Ve fırsat soyut bir şey değil — somut bir veri var. LinkedIn'in 2025 raporuna göre dünyanın en hızlı büyüyen iş tanımı 'AI Engineer'. Birkaç yıl önce yoktu bile. Şimdi tüm ünvan listelerinin tepesinde. Yeni rol şudur: AI'a iş yaptırabilen, çıktısını denetleyen, sistem kuran mühendis. Bu kursta tam olarak buraya hazırlanıyoruz.\",\n\n\"Ama bedava değil. Hız ve kolaylık tek tarafı. Diğer tarafta gerçek sorunlar var. AI Slop dediğimiz şey: yüzeyde çalışan ama altında kötü kalitede olan kod. Veri güvenliği ihlalleri, kalite problemleri, kötü UX, yönetim baskısı 'AI kullanın daha hızlı çıkarın' diyor, ve sessizce büyüyen technical debt. Bu sorunları da göreceğiz dört hafta boyunca.\",\n\n\"O yüzden mühendislere hala ihtiyaç var. Hatta belki her zamankinden çok. Grady Booch'un YouTube'daki son konuşması — 'The third golden age of software engineering' — tam buna değiniyor. Birkaç ana fikrini paylaşayım, çünkü bu kursun zihniyetini özetliyor.\",\n\n\"Booch'tan üç anahtar fikir. Bir: araçlarınız değişiyor ama problemleriniz değişmiyor. Sistem tasarımı, güvenlik, kalite, ölçeklenebilirlik, etik — hepsi hala mühendislik işi. İki: bir soyutlama seviyesinin daha yukarısına çıkıyoruz. Makine dilinden assembly'ye, oradan yüksek seviyeli dillere, oradan framework'lere, şimdi doğal dile. Bu yok oluş değil, yükseliş. Üç: kod yazmak yazılım mühendisliğinin sadece bir parçasıdır. Yazılım mühendisi teknik, ekonomik, insani, hukuki ve etik kuvvetleri dengeleyen kişidir. AI bu dengeyi kuramaz.\",\n\n\"Şimdi makaslamayı yapalım. Geriye dönüp bakalım. Sadece üç yıl önce, profesyonel yazılım ekipleri nasıl çalışıyordu? Bu çok yakın bir geçmiş — çoğunuz bu dönemi yaşadınız. Hatırlamak iyi, çünkü değişimin büyüklüğünü ancak başlangıç noktasını net görünce anlayabiliriz.\",\n\n\"Tipik on kişilik ekipte iş şöyleydi. PM ihtiyaç tanımlardı, tasarımcı çizerdi, senior mimari kararını verirdi, junior'lar Stack Overflow'la saatlerce kod yazardı, code review satır satır yapılırdı, QA test ederdi, DevOps deploy ederdi. Bir özellik fikirden production'a iki hafta, bazen iki ay sürerdi. Bu sistem otuz yıldır temelde aynıydı. Akış: insan yazar, insan okur, insan onaylar, insan deploy eder.\",\n\n\"Sonra üç yıl içinde her şey değişti. Üç dalga halinde. Birincisi otomatik tamamlama, ikincisi sohbet edilen IDE, üçüncüsü ajansal CLI. Her dalga çalışma şeklimizi değiştirdi. Sırayla bakalım.\",\n\n\"Birinci dalga: otomatik tamamlama. GitHub Copilot 2021 sonunda geldi. AI bizimle aynı satırda oturuyordu. Biz yazıyorduk, o tamamlıyordu. Akış değişmemişti, sadece klavye hızlanmıştı. Asistan değil, tamamlayıcı. Komut yok, sohbet yok. Sadece tahmin.\",\n\n\"İkinci dalga: sohbet edilen IDE. Cursor, Continue, Windsurf. ChatGPT'nin dalgasıyla AI'a komut verir olduk. 'Bu fonksiyonu yaz', 'şu hatayı düzelt' deyip her adımı onayladık. Akış tersine döndü. Biz tarif eden, AI yazan oldu. Bir özellik on dakikada gelebilir oldu. Ama hala her adımda Accept / Reject — süpervizyon devam ediyordu.\",\n\n\"Üçüncü dalga: ajansal CLI. Aralık 2025'te Anthropic Claude Code'u yayınladı. Opus modeli, terminalden çalışan agent. Fark muazzam. Artık her adımı onaylamıyorsunuz. 'Bu bug'ı düzelt' diyorsunuz: kodu okuyor, hipotez kuruyor, test çalıştırıyor, başarısız olursa tekrar deniyor, PR açıyor. Sen kahveye gidiyorsun. Kod yazma artık delegasyon. Yazılım üretiminin kendisi yeniden tanımlanıyor.\",\n\n\"Dalgalar teknolojiydi. Şimdi beceri tarafına bakalım. Üç dalgaya paralel üç kavram doğdu. Hepsi 'engineering' kelimesini taşıyor — çünkü gerçekten yeni mühendislik alanları. Önümüzdeki haftalarda her birine derinlemesine gireceğiz.\",\n\n\"Birinci kavram: prompt engineering. ChatGPT'nin ilk yıllarında doğdu. Komutu doğru kurmak bir sanat: net olmak, örnek vermek, rolü tanımlamak, çıktı formatını belirtmek. Hala önemli, ama tek başına yetmiyor. Çünkü bir agent uzun uzun çalışırken, ilk komuttan ibaret değil — yol boyunca onlarca karar veriyor.\",\n\n\"Sonra context engineering geldi. Sorun komutta değil, agent'ın eline tutuşturduğun bağlamda. Doğru dosyalar elinde mi? Doğru dokümantasyon? Hangi kısıtlar, hangi örüntüler? Bu bilgi mimarisi gibidir. CLAUDE.md, MCP server'lar, RAG buradan çıktı. İkinci haftada ilk konuştuğumuz şey bu olacak.\",\n\n\"Ve şimdi yeni kavram: harness engineering, ya da agentic engineering. Agent'lar paralel çalışıyor, birbirine iş veriyor, otomatik tetikleniyor. Soru artık 'agent'a nasıl iş veririm' değil — 'agent'ları çalıştıracağım sistemi nasıl kurarım'. Hooks, pipelines, izleme, kontrol. Eskiden CI/CD ne idiyse, harness engineering bugün o oluyor. Üçüncü ve dördüncü hafta bunun kalbinde.\",\n\n\"Hızlıca toparlayayım. Önümüzdeki hafta Claude Code derinlemesine. Kurulum, CLAUDE.md, plan modu, skills, hooks. Prompt mühendisliği. Ve canlı kodlama: bir sayfalık spec'ten çalışan koda gideceğiz. Hazırlıklı gelin.\",\n\n\"Ödev tek satır ama önemli: Capstone projen için bir sayfalık spec yaz. Henüz tek satır kod yok. Sadece ne yapacağının bir sayfa açıklaması. Çünkü yeni dünyada problem tanımı, çözümün kendisinden daha değerli. Net spec'e sahip olan agent'ı verimli kullanır. Spec'siz başlayan sonsuz refactor'da kaybolur. Slaytta gördüğünüz Google Form linkinden teslim edebilirsiniz — forms.gle/YQcEDMsYCjMbtHjj9. 9 Mayıs'ta Claude Code'u açtığımızda herkes elinde spec'le gelecek. Görüşürüz.\"\n]\n<\u002Fscript>\n\n<\u002Fhead>\n<body>\n<script src=\"47a06fc0-c9e1-4595-a27c-665b6c42ecb8\"><\u002Fscript>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 1: COVER -->\n<section data-label=\"01 Cover\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\">\n        <span>VIBE CODING<\u002Fspan>\n        <span class=\"accent-tag\">W_01 / 05<\u002Fspan>\n      <\u002Fdiv>\n      <div>02 MAYIS 2026 · İSTANBUL<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <div class=\"eyebrow\">Ders 01 · Değişim<\u002Fdiv>\n      <h1 class=\"title\" style=\"font-size:180px;\">AI Yazılım Geliştirmeyi\nNasıl Dönüştürdü?<\u002Fh1>\n      <div style=\"margin-top:48px; display:flex; gap:48px; align-items:center;\">\n        <div class=\"rule\" style=\"width:120px;\"><\u002Fdiv>\n        <div class=\"small\">Otomatik Tamamlamadan Ajansal CLI'ye · Üç Dalga · Beş Yıl<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div class=\"small\">OĞUZHAN ÇETİNKAYA<\u002Fdiv>\n      <div class=\"small\">5 HAFTALIK PROGRAM · DERS 1 / 5<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 2: SPEAKER -->\n<section data-label=\"02 Speaker\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>HAKKIMDA<\u002Fspan><span class=\"accent-tag\">/ 02<\u002Fspan><\u002Fdiv>\n      <div>OĞUZHAN ÇETİNKAYA<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 460px 1fr; gap:96px; flex:1; align-items:center;\">\n      <div style=\"aspect-ratio:1; width:460px; overflow:hidden; background:#F97316;\">\n        <img src=\"18ed9f13-a162-4486-bf6b-2ec4226895df\" alt=\"Oğuzhan Çetinkaya\" style=\"width:100%; height:100%; object-fit:cover; display:block;\">\n      <\u002Fdiv>\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:20px;\">Konuşmacı<\u002Fdiv>\n        <h2 class=\"title\" style=\"font-size:96px;\">Oğuzhan<br><span class=\"it\">Çetinkaya<\u002Fspan><\u002Fh2>\n        <div style=\"margin-top:48px; display:flex; flex-direction:column; gap:24px; font-size:30px;\">\n          <div><span class=\"muted\" style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:6px;\">Görev<\u002Fspan>Machine Learning Architect, Automation Anywhere<\u002Fdiv>\n          <div><span class=\"muted\" style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:6px;\">Konum<\u002Fspan>San Francisco Bay Area<\u002Fdiv>\n          <div><span class=\"muted\" style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:6px;\">LinkedIn<\u002Fspan><span class=\"accent\" style=\"font-family:var(--mono); font-size:24px;\">linkedin.com/in/oguzhancetinkaya<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n    <div class=\"corner-tag-right\">02 / 30<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 3: AGENDA -->\n<section data-label=\"03 Agenda\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>BUGÜN<\u002Fspan><span class=\"accent-tag\">/ 03<\u002Fspan><\u002Fdiv>\n      <div>120 DAKİKA · 7 BÖLÜM<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;\">\n      <div class=\"eyebrow\">Yolculuk<\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:88px;\">Ne <span class=\"it\">konuşacağız<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"margin-top:64px;\">\n      <ol class=\"list\" style=\"font-size:32px;\">\n        <li><span class=\"idx\">01<\u002Fspan><span><strong style=\"font-weight:500;\">Paradigma kayması.<\u002Fstrong> <span class=\"muted\">PC, internet, smartphone — ve AI'ın farkı.<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">02<\u002Fspan><span><strong style=\"font-weight:500;\">Öngörüler ve taze rakamlar.<\u002Fstrong> <span class=\"muted\">Dario, Karpathy, AI Dev Days SF.<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">03<\u002Fspan><span><strong style=\"font-weight:500;\">Tarih kendini tekrar eder.<\u002Fstrong> <span class=\"muted\">Matbaa, otomobil, daktilo.<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">04<\u002Fspan><span><strong style=\"font-weight:500;\">Fırsatlar ve dürüst sorunlar.<\u002Fstrong> <span class=\"muted\">AI Engineer, AI Slop, mühendislik neden hâlâ gerek.<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">05<\u002Fspan><span><strong style=\"font-weight:500;\">3 yıl önce yazılım ekipleri.<\u002Fstrong><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">06<\u002Fspan><span><strong style=\"font-weight:500;\">Üç dalga · üç kavram.<\u002Fstrong> <span class=\"muted\">Autocomplete → Agent CLI · Prompt → Harness.<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"idx\">07<\u002Fspan><span><strong style=\"font-weight:500;\">Gelecek hafta + ödev.<\u002Fstrong><\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n    <div class=\"corner-tag-right\">03 / 30<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 4: PARADIGM SHIFT (manifesto) -->\n<section class=\"inverted\" data-label=\"04 Paradigma\">\n  <div class=\"slide\">\n    <div class=\"slide-header\" style=\"color:#8B7F73;\">\n      <div class=\"left\"><span>BÖLÜM 01<\u002Fspan><span class=\"accent-tag\">PARADİGMA<\u002Fspan><\u002Fdiv>\n      <div>04 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; max-width:1500px;\">\n      <div class=\"eyebrow\" style=\"color:#F97316;\">Manifesto<\u002Fdiv>\n      <h1 style=\"font-family:var(--serif); font-weight:400; font-size:140px; line-height:0.96; letter-spacing:-0.02em; margin:0; color:#F5F1EB;\">\n        Bu bir <span class=\"it\" style=\"color:#F97316;\">araç<\u002Fspan><br>\n        güncellemesi <span class=\"it\">değil.<\u002Fspan>\n      <\u002Fh1>\n      <div style=\"margin-top:64px; max-width:1200px; font-size:38px; line-height:1.45; color:#B8AC9E;\">\n        Yeni bir framework öğrenmiyoruz. Yazılımı üretme şeklimizin kendisi yeniden yazılıyor — kim yazıyor, nasıl yazıyor, değer nereye akıyor.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 5 (new): KIRILIMLAR + AI'NIN FARKI -->\n<section data-label=\"05 Kirilimlar\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>BÖLÜM 01<\u002Fspan><span class=\"accent-tag\">KIRILIM<\u002Fspan><\u002Fdiv>\n      <div>05 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;\">\n      <div class=\"eyebrow\">İnsanlık tarihinin en büyük kırılımlarından biri<\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:76px;\">Bu sefer <span class=\"it\">fark<\u002Fspan> ne?<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"margin-top:48px; display:grid; grid-template-columns: repeat(4, 1fr); gap:24px;\">\n      <div class=\"card\" style=\"padding:28px;\">\n        <div class=\"label\">1980s<\u002Fdiv>\n        <div class=\"h\" style=\"font-size:38px;\">PC Devrimi<\u002Fdiv>\n        <div class=\"p\" style=\"font-size:22px;\">Bilgisayar masaya geldi. Yeni araç, daha çok iş.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px;\">\n        <div class=\"label\">1990s<\u002Fdiv>\n        <div class=\"h\" style=\"font-size:38px;\">İnternet<\u002Fdiv>\n        <div class=\"p\" style=\"font-size:22px;\">Bilgi ve ticaret küreselleşti. Yeni kanal.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px;\">\n        <div class=\"label\">2007 →<\u002Fdiv>\n        <div class=\"h\" style=\"font-size:38px;\">Smartphone<\u002Fdiv>\n        <div class=\"p\" style=\"font-size:22px;\">Her şey cebe girdi. Yeni platform.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px; background:var(--ink); border-color:var(--ink); color:var(--bg);\">\n        <div class=\"label\" style=\"color:#F97316;\">2022 →<\u002Fdiv>\n        <div class=\"h\" style=\"font-size:38px; color:var(--bg);\">AI<\u002Fdiv>\n        <div class=\"p\" style=\"font-size:22px; color:#B8AC9E;\">İlk kez teknoloji, insanın yerine geçecek şekilde tasarlanıyor.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:56px; padding:36px 44px; background:var(--accent-soft); border-left:4px solid var(--accent);\">\n      <div class=\"small accent\" style=\"margin-bottom:12px;\">FARK<\u002Fdiv>\n      <div style=\"font-size:30px; line-height:1.4;\">Önceki kırılımlar bize <strong>yeni araçlar<\u002Fstrong> verdi — biz onlarla daha çok iş yaptık. AI doğrudan <strong class=\"accent\">insanın yaptığı işin yerine<\u002Fstrong> geçecek şekilde tasarlanıyor. Yazılımcı, avukat, analist — her meslek farklı bir biçimde tehdit altında.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 6: DARIO QUOTE -->\n<section data-label=\"05 Dario\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>ÖNGÖRÜ<\u002Fspan><span class=\"accent-tag\">01 / 03<\u002Fspan><\u002Fdiv>\n      <div>06 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <div class=\"quote-block\">\n        <span class=\"open\">“<\u002Fspan>AI önümüzdeki <span class=\"it accent\">1–5 yıl<\u002Fspan> içinde teknoloji, hukuk, danışmanlık ve finansta giriş seviyesi rollerin <span class=\"it accent\">yarısını<\u002Fspan> ortadan kaldırabilir.”\n      <\u002Fdiv>\n      <div style=\"margin-top:64px; display:flex; gap:48px; align-items:center;\">\n        <div class=\"rule\" style=\"width:80px;\"><\u002Fdiv>\n        <div>\n          <div class=\"quote-attrib\" style=\"margin-bottom:8px;\">DARIO AMODEI<\u002Fdiv>\n          <div class=\"muted\" style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.06em;\">CEO, ANTHROPIC · 2025<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--line); padding-top:28px; display:grid; grid-template-columns: repeat(3,1fr); gap:48px;\">\n      <div>\n        <div class=\"small accent\" style=\"margin-bottom:8px;\">ETKİLENEN<\u002Fdiv>\n        <div style=\"font-size:24px;\">Araştırma, doküman incelemesi, temel kodlama, analiz<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"small accent\" style=\"margin-bottom:8px;\">RİSK<\u002Fdiv>\n        <div style=\"font-size:24px;\">Junior basamağı kayboluyor — senior nereden gelecek?<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"small accent\" style=\"margin-bottom:8px;\">DEĞER NEREDE?<\u002Fdiv>\n        <div style=\"font-size:24px;\">Yargı, denetim, sistem tasarımı<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 7: OTHERS -->\n<section data-label=\"07 Diger sesler\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>ÖNGÖRÜ<\u002Fspan><span class=\"accent-tag\">02 / 03<\u002Fspan><\u002Fdiv>\n      <div>07 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:20px;\">\n      <div class=\"eyebrow\">Aynı yöne işaret<\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:80px;\">Yalnız <span class=\"it\">bir ses değil<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cards\" style=\"grid-template-columns:1fr 1fr; margin-top:64px; gap:32px;\">\n      <div class=\"card\">\n        <div class=\"label\">Andrej Karpathy<\u002Fdiv>\n        <div class=\"h\" style=\"font-style:italic;\">\"Doğal dil yeni programlama dili.\"<\u002Fdiv>\n        <div class=\"p\">Software 1.0 (kod), 2.0 (model ağırlıkları), 3.0 (prompt). Yazılımın katmanı değişiyor.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">Sam Altman<\u002Fdiv>\n        <div class=\"h\" style=\"font-style:italic;\">\"Tek kişilik milyar dolarlık şirket.\"<\u002Fdiv>\n        <div class=\"p\">AI kaldıracıyla küçük takımlar tarihte hiç görülmemiş ölçekte iş çıkarıyor.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">Jensen Huang<\u002Fdiv>\n        <div class=\"h\" style=\"font-style:italic;\">\"Programlama dili artık insan dili.\"<\u002Fdiv>\n        <div class=\"p\">\"Çocuklarınıza kod öğretmeyin\" — ona göre AI artık o boşluğu dolduruyor.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\"><\u002Fdiv>\n        <div class=\"h\" style=\"font-style:italic;\">\"Kodumuzun %30'u AI tarafından yazılıyor.\"<\u002Fdiv>\n        <div class=\"p\">Microsoft'un 2025 itibariyle kamuoyuyla paylaştığı oran. Her ay artıyor.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n    <div class=\"corner-tag-right\">06 / 30<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 8: AI DEV DAYS — TAZE RAKAMLAR -->\n<section data-label=\"08 AI Dev Days\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>ÖNGÖRÜ<\u002Fspan><span class=\"accent-tag\">03 / 03<\u002Fspan><\u002Fdiv>\n      <div>08 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;\">\n      <div class=\"eyebrow\">AI Dev Days 2026 · DeepLearning.AI · San Francisco<\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:80px;\">Tahmin değil — <span class=\"it\">bugün.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"margin-top:48px; display:grid; grid-template-columns: repeat(3, 1fr); gap:32px;\">\n      <div style=\"border-top:2px solid var(--accent); padding-top:28px;\">\n        <div class=\"small accent\" style=\"margin-bottom:12px;\">CURSOR · ARALIK 2025<\u002Fdiv>\n        <div style=\"font-family:var(--serif); font-size:140px; line-height:0.9; color:var(--ink); letter-spacing:-0.02em;\">%60<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.4; margin-top:16px; color:var(--ink-soft);\">Enterprise commit'lerin yüzdesi <strong>agent<\u002Fstrong>'lar tarafından yapılıyor. Agent request'leri artık tab accept oranlarını <strong>geçti.<\u002Fstrong><\u002Fdiv>\n        <div class=\"small\" style=\"margin-top:12px;\">PR'LARIN %20'Sİ → AGENT<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid var(--accent); padding-top:28px;\">\n        <div class=\"small accent\" style=\"margin-bottom:12px;\">GOOGLE<\u002Fdiv>\n        <div style=\"font-family:var(--serif); font-size:140px; line-height:0.9; color:var(--ink); letter-spacing:-0.02em;\">%75<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.4; margin-top:16px; color:var(--ink-soft);\">Google'da yazılan kodun <strong>dörtte üçü<\u002Fstrong> agent'lar tarafından yazılıyor.<\u002Fdiv>\n        <div class=\"small\" style=\"margin-top:12px;\">İNSAN: KARAR · DENETİM<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid var(--accent); padding-top:28px;\">\n        <div class=\"small accent\" style=\"margin-bottom:12px;\">KARPATHY<\u002Fdiv>\n        <div style=\"font-family:var(--serif); font-size:60px; line-height:1; color:var(--ink); font-style:italic; letter-spacing:-0.01em; margin-top:16px;\">\"The hottest programming language is <span class=\"accent\">English.\"<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:22px; line-height:1.4; margin-top:24px; color:var(--ink-soft);\">Doğal dil katmanı — yeni interface.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 9: HISTORY INTRO (section header) -->\n<section data-label=\"09 Tarih bolumu\">\n  <div class=\"section-header\">\n    <div>\n      <div class=\"num\">02<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"label\">Bölüm İki<\u002Fdiv>\n      <h2 class=\"heading\">Tarih<br>kendini<br><span style=\"font-style:italic; color:var(--accent);\">tekrar eder.<\u002Fspan><\u002Fh2>\n      <div class=\"desc\">Bu film daha önce defalarca oynadı. Üç örnek — ve hepsinde tek bir desen.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 10: PRIN lass=\"it\">→ Traktör.<\u002Fspan><\u002Fh2>\n        <div class=\"body\" style=\"margin-top:48px; max-width:660px;\">\n          Tarım büyük ölçüde insan emeğine ve hayvan gücüne dayanıyordu. Traktör, biçerdöver ve modern ekipman geldi — daha az insanla çok daha fazla üretim mümkün oldu.\n        <\u002Fdiv>\n        <div class=\"body\" style=\"margin-top:24px; max-width:660px; color:var(--ink-soft);\">\n          Köyden şehre göç hızlandı. Tarım işçiliği azaldı; ama makine üretimi, bakım, yakıt, tarım mühendisliği ve lojistik büyüdü. <strong>Toplum yapısı yeniden şekillendi.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <table class=\"tbl\">\n          <tbody><tr><th>Eski<\u002Fth><th>Yeni<\u002Fth><\u002Ftr>\n          <tr><td>Tarım işçileri, ırgatlar<\u002Ftd><td>Tarım mühendisleri<\u002Ftd><\u002Ftr>\n          <tr><td>At, öküz, saban<\u002Ftd><td>Makine üretimi &amp; bakımı<\u002Ftd><\u002Ftr>\n          <tr><td>Köy ekonomisi<\u002Ftd><td>Yakıt, lojistik, gıda zinciri<\u002Ftd><\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n        <div style=\"margin-top:48px; padding:32px; background:var(--accent-soft); border-left:3px solid var(--accent);\">\n          <div class=\"small accent\" style=\"margin-bottom:12px;\">DESEN<\u002Fdiv>\n          <div style=\"font-size:28px; line-height:1.4;\">Saat veya fotoğraf gibi değil — toplum yapısını doğrudan değiştiren bir dönüşüm.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n    <div class=\"corner-tag-right\">12 / 30<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 13: COMMON PATTERN TABLE -->\n<section data-label=\"13 Ortak desen\">\n  <div class=\"slide\" style=\"padding-bottom:140px;\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>SENTEZ<\u002Fspan><span class=\"accent-tag\">DESEN<\u002Fspan><\u002Fdiv>\n      <div>13 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px; \n        Her paradigma değişikliği aynı şeyi yapar: eski beceriler değersizleşir, yeni beceriler altın değerinde olur. Yeni düzene ayak uyduran — işten atılma korkusunu değil, <strong style=\"color:#F5F1EB;\">en aranan kişi olma<\u002Fstrong> özgürlüğünü yaşar.\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap:48px; max-width:1700px;\">\n        <div style=\"border-top:1px solid #3A332C; padding-top:28px;\">\n          <div style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; color:#F97316; text-transform:uppercase; margin-bottom:14px;\">01 · Yenile<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-size:42px; line-height:1.05; color:#F5F1EB; font-style:italic;\">Yetenek setini güncelle.<\u002Fdiv>\n          <div style=\"color:#B8AC9E; font-size:22px; margin-top:14px; line-height:1.45;\">AI'a iş yaptırma, denetim, sistem kurma — yeni mühendisliğin temeli.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #3A332C; padding-top:28px;\">\n          <div style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; color:#F97316; text-transform:uppercase; margin-bottom:14px;\">02 · Konumlan<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-size:42px; line-height:1.05; color:#F5F1EB; font-style:italic;\">Aranan rolü üstlen.<\u002Fdiv>\n          <div style=\"color:#B8AC9E; font-size:22px; margin-top:14px; line-height:1.45;\">İşten atılma korkusu değil — pazarlık masasında avantajlı taraf.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #3A332C; padding-top:28px;\">\n          <div style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.1em; color:#F97316; text-transform:uppercase; margin-bottom:14px;\">03 · Üret<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-size:42px; line-height:1.05; color:#F5F1EB; font-style:italic;\">Yeni ihtiyacı sen karşıla.<\u002Fdiv>\n          <div style=\"color:#B8AC9E; font-size:22px; margin-top:14px; line-height:1.45;\">Yeni düzenin araçları, şirketleri, hizmetleri — birinin kuracağı her şey.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:64px; font-size:30px; color:#F5F1EB; font-family:var(--serif); font-style:italic;\">Soru artık <span style=\"color:#F97316;\">\"ayakta kalır mıyım\"<\u002Fspan> değil — <span style=\"color:#F97316;\">\"bu dalgayı nasıl bineceğim.\"<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 15: AI ENGINEER — LINKED IN -->\n<section data-label=\"15 AI Engineer\">\n  <div class=\"slide\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>FIRSAT<\u002Fspan><span class=\"accent-tag\">VERİ<\u002Fspan><\u002Fdiv>\n      <div>15 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:96px; flex:1; align-items:center;\">\n      <div>\n        <div class=\"eyebrow\">LinkedIn 2025 Raporu<\u002Fdiv>\n        <h2 class=\"title\" style=\"font-size:96px;\">Dünyanın en hızlı büyüyen <span class=\"it\">iş tanımı:<\u002Fspan><\u002Fh2>\n        <div style=\"margin-top:48px; font-family:var(--serif); font-size:160px; line-height:0.9; color:var(--accent); font-style:italic; letter-spacing:-0.02em;\">AI Engineer.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:32px; line-height:1.45; color:var(--ink-soft); margin-bottom:48px;\">Birkaç yıl önce <strong>yoktu bile.<\u002Fstrong> Şimdi tüm ünvan listelerinin tepesinde.<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:24px;\">\n          <div style=\"display:grid; grid-template-columns: 220px 1fr; gap:24px; padding-bottom:20px; border-bottom:1px solid var(--line);\">\n            <div class=\"small accent\">YENİ ROL<\u002Fdiv>\n            <div style=\"font-size:26px;\">AI'a iş yaptırabilen, çıktısını denetleyen mimar.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 220px 1fr; gap:24px; padding-bottom:20px; border-bottom:1px solid var(--line);\">\n            <div class=\"small accent\">SKİLL SET<\u002Fdiv>\n            <div style=\"font-size:26px;\">Prompt + Context + Harness Engineering.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 220px 1fr; gap:24px;\">\n            <div class=\"small accent\">BU KURS<\u002Fdiv>\n            <div style=\"font-size:26px;\">Tam olarak buraya hazırlıyoruz.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 16: AI SLOP — SORUNLAR -->\n<section data-label=\"16 AI Slop\">\n  <div class=\"slide\" style=\"padding-bottom:180px;\">\n    <div class=\"slide-header\">\n      <div class=\"left\"><span>DÜRÜSTLÜK<\u002Fspan><span class=\"accent-tag\">SORUNLAR<\u002Fspan><\u002Fdiv>\n      <div>16 / 30<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;\">\n      <div class=\"eyebrow\">Ama bedava değil<\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:80px;\">Hızın <span class=\"it\">faturası.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"margin-top:48px; display:grid; grid-template-columns: 1fr 1fr; gap:32px;\">\n      <div class=\"card\" style=\"background:var(--ink); color:var(--bg); border-color:var(--ink);\">\n        <div class=\"label\" style=\"color:#F97316;\">YENİ KAVRAM<\u002Fdiv>\n        <div class=\"h\" style=\"color:var(--bg); font-style:italic;\">AI Slop<\u002Fdiv>\n        <div class=\"p\" style=\"color:#B8AC9E;\">Yüzeyde çalışan, altında kötü kalitede kod. Çalışıyor sandığınız şey, prod'da sessizce çöküyor.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">GÜVENLİK<\u002Fdiv>\n        <div class=\"h\">Data security breaches<\u002Fdiv>\n        <div class=\"p\">Agent'lar yetkisiz endpoint'lere yazıyor, secret'lar log'la tion:column; gap:24px;\">\n          <div style=\"display:grid; grid-template-columns: 240px 1fr; gap:24px; padding-bottom:20px; border-bottom:1px solid var(--line);\">\n            <div class=\"small accent\">AKIŞ<\u002Fdiv>\n            <div style=\"font-size:28px;\">Tersine döndü. Yazıcı → tarif eden.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 240px 1fr; gap:24px; padding-bottom:20px; border-bottom:1px solid var(--line);\">\n            <div class=\"small accent\">HIZ<\u002Fdiv>\n            <div style=\"font-size:28px;\">Bir özellik 10 dakikada gelebilir oldu.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 240px 1fr; gap:24px;\">\n            <div class=\"small accent\">SINIRI<\u002Fdiv>\n            <div style=\"font-size:28px;\">Hala süpervizyon — her adımda Accept / Reject.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"corner-tag\">VIBE CODING · W_01<\u002Fdiv>\n    <div class=\"corner-tag-right\">23 / 30<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 24: WAVE 3 - AGENTIC CLI -->\n<section class=\"inverted\" data-label=\"24 Dalga 3 Agent\">\n  <div class=\"slide\">\n    <div class=\"slide-header\" style=\"color:#8B7F73;\">\n      <div class=\"left\"><span>DALGA<\u002Fspan><span class=\"accent-tag\">03 / 03<\u002Fspan><\u002Fdiv>\n      <div>ARALIK 2025 →<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:80px; flex:1; align-items:center;\">\n      <div>\n        <div style=\"font-family:var(--serif); font-style:italic; font-size:240px; line-height:0.85; color:#F97316;\">03<\u002Fdiv>\n        <div style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.08em; color:#8B7F73; margin-top:24px;\">CLAUDE CODE · OPUS<\u002Fdiv>\n        <h2 style=\"font-family:var(--serif); font-weight:400; font-size:88px; line-height:0.98; letter-spacing:-0.02em;
